name: Build Java Images

on:
  workflow_dispatch:
    inputs:
      java_8:
        type: boolean
        default: true
      java_11:
        type: boolean
        default: true
      java_17:
        type: boolean
        default: true
      java_21:
        type: boolean
        default: true
      java_25:
        type: boolean
        default: true
      publish:
        type: boolean
        default: true
      security_scan:
        type: boolean
        default: true

env:
  DOCKER_HUB_USER: taha2samy  
  DOCKER_REPO_NAME: java
  DOCKER_FULL_IMAGE: index.docker.io/taha2samy/java
  GHCR_REPO_NAME: java
jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-versions.outputs.versions }}
    steps:
      - id: set-versions
        run: |
          VERSIONS=()
          ${{ github.event.inputs.java_8 }} && VERSIONS+=("8")
          ${{ github.event.inputs.java_11 }} && VERSIONS+=("11")
          ${{ github.event.inputs.java_17 }} && VERSIONS+=("17")
          ${{ github.event.inputs.java_21 }} && VERSIONS+=("21")
          ${{ github.event.inputs.java_25 }} && VERSIONS+=("25")
          JSON_ARRAY=$(printf '%s\n' "${VERSIONS[@]}" | jq -R . | jq -s -c .)
          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT

  security-and-test:
    needs: define-matrix
    if: needs.define-matrix.outputs.versions != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        java_version: ${{ fromJSON(needs.define-matrix.outputs.versions) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
          echo "DOCKER_FULL_IMAGE=index.docker.io/taha2samy/${{ env.DOCKER_REPO_NAME }}" >> $GITHUB_ENV
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Render Templates
        run: |
          pip install jinja2
          python .github/scripts/render_templates.py
          echo "Rendered Templates ffffffffffffffffffffff"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: just
        run: |
          ls -la
          tree
      - name: Build Local for Testing
        uses: docker/bake-action@v6
        with:
          source: .
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: false
          load: true
          provenance: false
          sbom: false
          set: |
            *.platform=linux/amd64
            *.args.GHCR_REGISTRY=ghcr.io/${{ env.OWNER_LC }}

      - name: Install Trivy
        if: github.event.inputs.security_scan == 'true'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy Scan
        if: github.event.inputs.security_scan == 'true'
        run: |
          IMAGES=(
            "${{ env.DOCKER_FULL_IMAGE }}:${{ matrix.java_version }}-jdk-std"
            "${{ env.DOCKER_FULL_IMAGE }}:${{ matrix.java_version }}-jre-std"
            "${{ env.DOCKER_FULL_IMAGE }}:${{ matrix.java_version }}-jre-distroless"
          )

          for IMG in "${IMAGES[@]}"; do
            trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --vuln-type os,library "$IMG"
          done

      - name: Run Functional Tests
        run: |
          chmod +x tests/verify.sh
          ./tests/verify.sh "${{ env.DOCKER_FULL_IMAGE }}:${{ matrix.java_version }}-jdk-std" "jdk"
          ./tests/verify.sh "${{ env.DOCKER_FULL_IMAGE }}:${{ matrix.java_version }}-jre-std" "jre"
          ./tests/verify.sh "${{ env.DOCKER_FULL_IMAGE }}:${{ matrix.java_version }}-jre-distroless" "distroless"

  build-and-push:
    needs: [define-matrix, security-and-test]
    if: github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: PUBLISH_IMAGES
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        java_version: ${{ fromJSON(needs.define-matrix.outputs.versions) }}

    env:
      DOCKER_REPO_NAME: java
      GHCR_REPO_NAME: java

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
          echo "DOCKER_FULL_IMAGE=index.docker.io/taha2samy/${{ env.DOCKER_REPO_NAME }}" >> $GITHUB_ENV
          echo "GHCR_FULL_IMAGE=ghcr.io/${OWNER,,}/${{ env.GHCR_REPO_NAME }}" >> $GITHUB_ENV
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Render Templates
        run: |
          pip install jinja2
          python .github/scripts/render_templates.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (Multi-Arch)
        id: bake
        uses: docker/bake-action@v6
        with:
          source: .
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: true
      
            

      - name: just
        run: |
          ls -la
          tree

      - name: Extract Digests
        id: digests
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'
          echo "jdk=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jdk-std"["containerimage.digest"]')" >> $GITHUB_OUTPUT
          echo "jre=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre-std"["containerimage.digest"]')" >> $GITHUB_OUTPUT
          echo "distro=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre-distroless"["containerimage.digest"]')" >> $GITHUB_OUTPUT

      - name: Attest JDK
        if: steps.digests.outputs.jdk != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.DOCKER_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.jdk }}
          push-to-registry: true

      - name: Attest JDK (GHCR)
        if: steps.digests.outputs.jdk != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.jdk }}
          push-to-registry: true

      - name: Attest JRE
        if: steps.digests.outputs.jre != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.DOCKER_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.jre }}
          push-to-registry: true

      - name: Attest JRE (GHCR)
        if: steps.digests.outputs.jre != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.jre }}
          push-to-registry: true

      - name: Attest Distroless
        if: steps.digests.outputs.distro != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.DOCKER_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.distro }}
          push-to-registry: true

      - name: Attest Distroless (GHCR)
        if: steps.digests.outputs.distro != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.distro }}
          push-to-registry: true

      - name: Verify SLSA Provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            set -euo pipefail

            verify_img () {
              local NAME="$1"
              local DIGEST="$2"
              if [ "$DIGEST" != "null" ]; then
                gh attestation verify oci://${{ env.GHCR_FULL_IMAGE }}@$DIGEST --owner ${{ env.OWNER_LC }}
              fi
            }

            verify_img "JDK" "${{ steps.digests.outputs.jdk }}"
            verify_img "JRE" "${{ steps.digests.outputs.jre }}"
            verify_img "Distro" "${{ steps.digests.outputs.distro }}"
