name: Build Java Images

on:
  workflow_dispatch:
    inputs:
      java_8:
        description: 'Java 8'
        type: boolean
        default: false
      java_11:
        description: 'Java 11'
        type: boolean
        default: false
      java_17:
        description: 'Java 17'
        type: boolean
        default: true
      java_21:
        description: 'Java 21'
        type: boolean
        default: false

env:
  IMAGE_NAME: docker.io/taha2samy/java

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-versions.outputs.versions }}
    steps:
      - id: set-versions
        run: |
          VERSIONS=()
          ${{ github.event.inputs.java_8 }} && VERSIONS+=("8")
          ${{ github.event.inputs.java_11 }} && VERSIONS+=("11")
          ${{ github.event.inputs.java_17 }} && VERSIONS+=("17")
          ${{ github.event.inputs.java_21 }} && VERSIONS+=("21")
          
          JSON_ARRAY=$(printf '%s\n' "${VERSIONS[@]}" | jq -R . | jq -s -c .)
          
          echo "Selected versions: $JSON_ARRAY"
          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT

  build:
    needs: define-matrix
    if: needs.define-matrix.outputs.versions != '[]' && needs.define-matrix.outputs.versions != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write 
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        java_version: ${{ fromJSON(needs.define-matrix.outputs.versions) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker Bake (Build and Push)
        id: bake
        uses: docker/bake-action@v5
        with:
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: true

      - name: Extract and Attest
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'
          for TARGET in "jdk-std" "jre-std" "jre-distroless"; do
            DIGEST=$(echo "$METADATA" | jq -r ".\"java${{ matrix.java_version }}-$TARGET\"[\"containerimage.digest\"]")
            if [ "$DIGEST" != "null" ]; then
              echo "Attesting java${{ matrix.java_version }}-$TARGET with digest $DIGEST"
              gh attestation verify "$DIGEST" --repo ${{ github.repository }} || echo "Creating attestation..."
            fi
          done
        env:
          GH_TOKEN: ${{ github.token }}
