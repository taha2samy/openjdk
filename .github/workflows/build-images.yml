name: Build Java Images

on:
  workflow_dispatch:
    inputs:
      java_8:
        type: boolean
        default: true
      java_11:
        type: boolean
        default: true
      java_17:
        type: boolean
        default: true
      java_21:
        type: boolean
        default: true
      java_25:
        type: boolean
        default: true
      publish:
        type: boolean
        default: true
      security_scan:
        type: boolean
        default: true

env:
  DOCKER_IMAGE: docker.io/taha2samy/java
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/java

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-versions.outputs.versions }}
    steps:
      - id: set-versions
        run: |
          VERSIONS=()
          ${{ github.event.inputs.java_8 }} && VERSIONS+=("8")
          ${{ github.event.inputs.java_11 }} && VERSIONS+=("11")
          ${{ github.event.inputs.java_17 }} && VERSIONS+=("17")
          ${{ github.event.inputs.java_21 }} && VERSIONS+=("21")
          ${{ github.event.inputs.java_25 }} && VERSIONS+=("25")
          JSON_ARRAY=$(printf '%s\n' "${VERSIONS[@]}" | jq -R . | jq -s -c .)
          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT

  build-and-test:
    needs: define-matrix
    if: needs.define-matrix.outputs.versions != '[]'
    runs-on: ubuntu-latest
    environment: PUBLISH_IMAGES
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        java_version: ${{ fromJSON(needs.define-matrix.outputs.versions) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner
        run: echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Jinja2
        run: |
          pip install jinja2
          python .github/scripts/render_templates.py


      - name: Login to Docker Hub
        if: github.event.inputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        if: github.event.inputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for Testing (Load to Docker)
        uses: docker/bake-action@v5
        with:
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: false
          load: true
          provenance: false
          sbom: false
          set: |
            *.platform=linux/amd64
            *.args.GHCR_REGISTRY=ghcr.io/${{ env.OWNER_LC }}

      - name: Install Trivy
        if: github.event.inputs.security_scan == 'true'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy Scan (Fail on HIGH/CRITICAL)
        if: github.event.inputs.security_scan == 'true'
        run: |
          IMAGES=(
            "docker.io/taha2samy/java:${{ matrix.java_version }}-jdk-std"
            "docker.io/taha2samy/java:${{ matrix.java_version }}-jre-std"
            "docker.io/taha2samy/java:${{ matrix.java_version }}-jre-distroless"
          )

          for IMG in "${IMAGES[@]}"; do
            trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --vuln-type os,library "$IMG"
          done

      - name: Make verify script executable
        run: chmod +x tests/verify.sh

      - name: Run Functional Tests
        run: |
          ./tests/verify.sh "docker.io/taha2samy/java:${{ matrix.java_version }}-jdk-std" "jdk"
          ./tests/verify.sh "docker.io/taha2samy/java:${{ matrix.java_version }}-jre-std" "jre"
          ./tests/verify.sh "docker.io/taha2samy/java:${{ matrix.java_version }}-jre-distroless" "distroless"



      - name: Build and Push (Multi-Arch)
        id: bake
        if: github.event.inputs.publish == 'true'
        uses: docker/bake-action@v5
        with:
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: true

      - name: Extract Digests
        id: digests
        if: github.event.inputs.publish == 'true'
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'
          echo "jdk=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jdk-std"["containerimage.digest"]')" >> $GITHUB_OUTPUT
          echo "jre=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre-std"["containerimage.digest"]')" >> $GITHUB_OUTPUT
          echo "distro=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre-distroless"["containerimage.digest"]')" >> $GITHUB_OUTPUT

      - name: Attest Images
        if: github.event.inputs.publish == 'true'
        run: |
            attest_img () {
              local NAME="$1"
              local DIGEST="$2"
              if [ "$DIGEST" != "null" ] && [ -n "$DIGEST" ]; then
                gh attestation create --repo ${{ github.repository }} \
                  --subject-name index.docker.io/taha2samy/java \
                  --subject-digest "$DIGEST"

                gh attestation create --repo ${{ github.repository }} \
                  --subject-name ghcr.io/${{ env.OWNER_LC }}/open-jdk \
                  --subject-digest "$DIGEST"
              fi
            }

            attest_img "JDK" "${{ steps.digests.outputs.jdk }}"
            attest_img "JRE" "${{ steps.digests.outputs.jre }}"
            attest_img "Distro" "${{ steps.digests.outputs.distro }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
