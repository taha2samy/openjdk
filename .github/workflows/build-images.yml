name: Build and Push Java Images

on:
  workflow_dispatch:
    inputs:
      java_8:
        type: boolean
        default: true
      java_11:
        type: boolean
        default: true
      java_17:
        type: boolean
        default: true
      java_21:
        type: boolean
        default: true
      java_25:
        type: boolean
        default: true

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}
    steps:
      - id: set-matrix
        run: |
          VERSIONS=()
          [[ "${{ inputs.java_8 }}" == "true" ]] && VERSIONS+=("8")
          [[ "${{ inputs.java_11 }}" == "true" ]] && VERSIONS+=("11")
          [[ "${{ inputs.java_17 }}" == "true" ]] && VERSIONS+=("17")
          [[ "${{ inputs.java_21 }}" == "true" ]] && VERSIONS+=("21")
          [[ "${{ inputs.java_25 }}" == "true" ]] && VERSIONS+=("25")
          echo "versions=$(printf '%s\n' "${VERSIONS[@]}" | jq -R . | jq -s -c .)" >> $GITHUB_OUTPUT

  build-and-push:
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.versions != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        java_version: ${{ fromJSON(needs.prepare-matrix.outputs.versions) }}

    steps:

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Setup Environment
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}
      - name: debug
        run: |
          ls -la
          tree -a
      - name: Setup Taskfile
        uses: ./.github/actions/setup-taskfile
      - name: Resolve and Render
        run: task render

      - name: Set up Docker Buildx
        uses: 
          docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4  # v6
        id: build
        with:
          source: .
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
          targets: java${{ matrix.java_version }}
          push: true

      - name: Extract Root Index Digests
        id: digests
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'
          JDK_SHA=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jdk"["containerimage.digest"]')
          JRE_SHA=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre"["containerimage.digest"]')
          DISTRO_SHA=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-distroless"["containerimage.digest"]')          
          echo "jdk=$JDK_SHA" >> $GITHUB_OUTPUT
          echo "jre=$JRE_SHA" >> $GITHUB_OUTPUT
          echo "distro=$DISTRO_SHA" >> $GITHUB_OUTPUT
          
      - name: Attest JDK (SLSA)
        if: steps.digests.outputs.jdk != 'null' && steps.digests.outputs.jdk != 
          ''
        uses: 
          actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.jdk }}
          push-to-registry: true

      - name: Attest JRE (SLSA)
        if: steps.digests.outputs.jre != 'null' && steps.digests.outputs.jre != 
          ''
        uses: 
          actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.jre }}
          push-to-registry: true

      - name: Attest Distroless (SLSA)
        if: steps.digests.outputs.distro != 'null' && 
          steps.digests.outputs.distro != ''
        uses: 
          actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}
          subject-digest: ${{ steps.digests.outputs.distro }}
          push-to-registry: true

