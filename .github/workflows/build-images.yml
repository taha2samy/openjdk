name: Build Java Images

on:
  workflow_dispatch:
    inputs:
      java_8:
        type: boolean
        default: true
      java_11:
        type: boolean
        default: true
      java_17:
        type: boolean
        default: true
      java_21:
        type: boolean
        default: true
      java_25:
        type: boolean
        default: true
      publish:
        type: boolean
        default: true
      security_scan:
        type: boolean
        default: true

env:
  DOCKER_REPO_NAME: java
  GHCR_REPO_NAME: java
  # Using standard github context for image names
  DOCKER_FULL_IMAGE: index.docker.io/taha2samy/java

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-versions.outputs.versions }}
    steps:
      - id: set-versions
        run: |
          VERSIONS=()
          [[ "${{ github.event.inputs.java_8 }}" == "true" ]] && VERSIONS+=("8")
          [[ "${{ github.event.inputs.java_11 }}" == "true" ]] && VERSIONS+=("11")
          [[ "${{ github.event.inputs.java_17 }}" == "true" ]] && VERSIONS+=("17")
          [[ "${{ github.event.inputs.java_21 }}" == "true" ]] && VERSIONS+=("21")
          [[ "${{ github.event.inputs.java_25 }}" == "true" ]] && VERSIONS+=("25")
          # Create JSON array
          JSON_ARRAY=$(printf '%s\n' "${VERSIONS[@]}" | jq -R . | jq -s -c .)
          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT

  security-and-test:
    needs: define-matrix
    if: needs.define-matrix.outputs.versions != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        java_version: ${{ fromJSON(needs.define-matrix.outputs.versions) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
          echo "GHCR_FULL_IMAGE=ghcr.io/${OWNER,,}/${{ env.GHCR_REPO_NAME }}" >> $GITHUB_ENV
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Render Templates
        run: |
          pip install jinja2
          python .github/scripts/render_templates.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Local for Testing
        uses: docker/bake-action@v6
        with:
          source: .
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: false
          load: true # Important: Loads images to local docker daemon for testing
          provenance: false
          sbom: false
          set: |
            *.platform=linux/amd64
            *.args.GHCR_REGISTRY=ghcr.io/${{ env.OWNER_LC }}
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false

      - name: Install Trivy
        if: github.event.inputs.security_scan == 'true'
        uses: aquasecurity/setup-trivy@v0.2.5
        with:
          cache: true

      - name: Run Trivy Scan
        if: github.event.inputs.security_scan == 'true'
        run: |
          IMAGES=(
            "${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jdk-std"
            "${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jre-std"
            "${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jre-distroless"
          )

          for IMG in "${IMAGES[@]}"; do
            echo "Scanning $IMG..."
            trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --vuln-type os,library "$IMG"
          done

      - name: Run Functional Tests
        run: |
          chmod +x tests/verify.sh
          ./tests/verify.sh "${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jdk-std" "jdk"
          ./tests/verify.sh "${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jre-std" "jre"
          ./tests/verify.sh "${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jre-distroless" "distroless"

  build-and-push:
    needs: [define-matrix, security-and-test]
    if: github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: PUBLISH_IMAGES
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        java_version: ${{ fromJSON(needs.define-matrix.outputs.versions) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment Variables
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
          echo "GHCR_FULL_IMAGE=ghcr.io/${OWNER,,}/${{ env.GHCR_REPO_NAME }}" >> $GITHUB_ENV
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Render Templates
        run: |
          pip install jinja2
          python .github/scripts/render_templates.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (Multi-Arch)
        id: bake
        uses: docker/bake-action@v6
        with:
          source: .
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: true
          # Implicitly uses provenance: true (default)

      - name: Extract Digests
        id: digests
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'
          echo "jdk=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jdk-std"["containerimage.digest"]')" >> $GITHUB_OUTPUT
          echo "jre=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre-std"["containerimage.digest"]')" >> $GITHUB_OUTPUT
          echo "distro=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre-distroless"["containerimage.digest"]')" >> $GITHUB_OUTPUT

      # ==================================
      # Attestations (Provenance)
      # ==================================
      - name: Attest JDK (GHCR)
        if: steps.digests.outputs.jdk != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}
          subject-digest: ${{ steps.digests.outputs.jdk }}
          push-to-registry: true

      - name: Attest JRE (GHCR)
        if: steps.digests.outputs.jre != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}
          subject-digest: ${{ steps.digests.outputs.jre }}
          push-to-registry: true

      - name: Attest Distroless (GHCR)
        if: steps.digests.outputs.distro != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}
          subject-digest: ${{ steps.digests.outputs.distro }}
          push-to-registry: true

      - name: Verify SLSA Provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            set -euo pipefail

            verify_img () {
              local DIGEST="$1"
              if [ "$DIGEST" != "null" ]; then
                # Correct syntax: oci://image@digest
                gh attestation verify "oci://${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}@$DIGEST" --owner ${{ env.OWNER_LC }}
              fi
            }

            verify_img "${{ steps.digests.outputs.jdk }}"
            verify_img "${{ steps.digests.outputs.jre }}"
            verify_img "${{ steps.digests.outputs.distro }}"

      # ==================================
      # SBOM Generation & Attestation
      # ==================================
      
      # --- JDK ---
      - name: Generate SBOM (JDK)
        if: steps.digests.outputs.jdk != 'null'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jdk-std@${{ steps.digests.outputs.jdk }}
          format: cyclonedx-json
          output-file: sbom-jdk.json

      - name: Attest SBOM (JDK)
        if: steps.digests.outputs.jdk != 'null'
        uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jdk-std
          subject-digest: ${{ steps.digests.outputs.jdk }}
          sbom-path: sbom-jdk.json
          push-to-registry: true

      # --- JRE ---
      - name: Generate SBOM (JRE)
        if: steps.digests.outputs.jre != 'null'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jre-std@${{ steps.digests.outputs.jre }}
          format: cyclonedx-json
          output-file: sbom-jre.json

      - name: Attest SBOM (JRE)
        if: steps.digests.outputs.jre != 'null'
        uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jre-std
          subject-digest: ${{ steps.digests.outputs.jre }}
          sbom-path: sbom-jre.json
          push-to-registry: true

      # --- Distroless ---
      - name: Generate SBOM (Distroless)
        if: steps.digests.outputs.distro != 'null'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jre-distroless@${{ steps.digests.outputs.distro }}
          format: cyclonedx-json
          output-file: sbom-distro.json

      - name: Attest SBOM (Distroless)
        if: steps.digests.outputs.distro != 'null'
        uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ env.GHCR_FULL_IMAGE }}-${{ matrix.java_version }}:jre-distroless
          subject-digest: ${{ steps.digests.outputs.distro }}
          sbom-path: sbom-distro.json
          push-to-registry: true

  cleanup-ghcr:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      packages: write
      contents: read

    steps:
      - name: Delete Images Older Than 1 Hour
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PACKAGE_NAME: java
        run: |
          echo "Starting cleanup for package: $PACKAGE_NAME owned by $OWNER"

          # Determine Owner Type (User or Organization) to select correct API endpoint
          OWNER_TYPE=$(gh api "/repos/$OWNER/$REPO" --jq '.owner.type')
          
          if [ "$OWNER_TYPE" == "Organization" ]; then
            API_ENDPOINT="/orgs/$OWNER/packages/container/$PACKAGE_NAME/versions"
          else
            API_ENDPOINT="/users/$OWNER/packages/container/$PACKAGE_NAME/versions"
          fi
          
          echo "Detected Owner Type: $OWNER_TYPE using endpoint: $API_ENDPOINT"

          NOW_TS=$(date +%s)
          # Cutoff: 1 hour (3600 seconds)
          CUTOFF_TS=$((NOW_TS - 3600))
          echo "Cutoff timestamp: $CUTOFF_TS"

          echo "Fetching versions..."
          # Added error handling || true to prevent job failure if package doesn't exist yet
          VERSIONS=$(gh api "$API_ENDPOINT" --paginate --jq '.[] | {id: .id, updated_at: .updated_at, tags: .metadata.container.tags}' || echo "")

          if [ -z "$VERSIONS" ]; then
            echo "No versions found or package does not exist."
            exit 0
          fi

          echo "$VERSIONS" | jq -c '.' | while read -r item; do
            ID=$(echo "$item" | jq -r '.id')
            UPDATED_AT=$(echo "$item" | jq -r '.updated_at')
            TAGS=$(echo "$item" | jq -r '.tags')

            IMG_TS=$(date -d "$UPDATED_AT" +%s)

            if [ "$IMG_TS" -lt "$CUTOFF_TS" ]; then
              echo "---------------------------------------------------"
              echo "🗑️ DELETING: ID=$ID"
              echo "   Time: $UPDATED_AT"
              echo "   Tags: $TAGS"
              
              # Using -X DELETE to remove the version
              gh api -X DELETE "$API_ENDPOINT/$ID" || echo "⚠️ Failed to delete $ID"
            else
              echo "✅ KEEPING: ID=$ID (Newer than 1 hour)"
            fi
          done