name: Build Java Images

on:
  workflow_dispatch:
    inputs:
      java_8:
        type: boolean
        default: true
      java_11:
        type: boolean
        default: true
      java_17:
        type: boolean
        default: true
      java_21:
        type: boolean
        default: true
      java_25:
        type: boolean
        default: true
      publish:
        type: boolean
        default: true
      security_scan:
        type: boolean
        default: true

env:
  DOCKER_IMAGE: docker.io/taha2samy/java
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/java

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-versions.outputs.versions }}
    steps:
      - id: set-versions
        run: |
          VERSIONS=()
          ${{ github.event.inputs.java_8 }} && VERSIONS+=("8")
          ${{ github.event.inputs.java_11 }} && VERSIONS+=("11")
          ${{ github.event.inputs.java_17 }} && VERSIONS+=("17")
          ${{ github.event.inputs.java_21 }} && VERSIONS+=("21")
          ${{ github.event.inputs.java_25 }} && VERSIONS+=("25")
          JSON_ARRAY=$(printf '%s\n' "${VERSIONS[@]}" | jq -R . | jq -s -c .)
          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT

  build-and-test:
    needs: define-matrix
    if: needs.define-matrix.outputs.versions != '[]'
    runs-on: ubuntu-latest
    environment: PUBLISH_IMAGES
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        java_version: ${{ fromJSON(needs.define-matrix.outputs.versions) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Owner
        run: echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Jinja2
        run: |
          pip install jinja2
          python .github/scripts/render_templates.py


      - name: Login to Docker Hub
        if: github.event.inputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GHCR
        if: github.event.inputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build for Testing (Load to Docker)
        uses: docker/bake-action@v5
        with:
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: false
          load: true
          provenance: false
          sbom: false
          set: |
            *.platform=linux/amd64
            *.args.GHCR_REGISTRY=ghcr.io/${{ env.OWNER_LC }}

      - name: Install Trivy
        if: github.event.inputs.security_scan == 'true'
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy Scan (Fail on HIGH/CRITICAL)
        if: github.event.inputs.security_scan == 'true'
        run: |
          IMAGES=(
            "docker.io/taha2samy/java:${{ matrix.java_version }}-jdk-std"
            "docker.io/taha2samy/java:${{ matrix.java_version }}-jre-std"
            "docker.io/taha2samy/java:${{ matrix.java_version }}-jre-distroless"
          )

          for IMG in "${IMAGES[@]}"; do
            trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --vuln-type os,library "$IMG"
          done

      - name: Make verify script executable
        run: chmod +x tests/verify.sh

      - name: Run Functional Tests
        run: |
          ./tests/verify.sh "docker.io/taha2samy/java:${{ matrix.java_version }}-jdk-std" "jdk"
          ./tests/verify.sh "docker.io/taha2samy/java:${{ matrix.java_version }}-jre-std" "jre"
          ./tests/verify.sh "docker.io/taha2samy/java:${{ matrix.java_version }}-jre-distroless" "distroless"



      - name: Build and Push (Multi-Arch)
        id: bake
        if: github.event.inputs.publish == 'true'
        uses: docker/bake-action@v5
        with:
          files: |
            docker-bake.hcl
            versions/${{ matrix.java_version }}/build.hcl
            versions.hcl
          targets: java${{ matrix.java_version }}
          push: true

      - name: Extract Digests
        id: digests
        if: github.event.inputs.publish == 'true'
        run: |
          METADATA='${{ steps.bake.outputs.metadata }}'
          echo "jdk=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jdk-std"["containerimage.digest"]')" >> $GITHUB_OUTPUT
          echo "jre=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre-std"["containerimage.digest"]')" >> $GITHUB_OUTPUT
          echo "distro=$(echo "$METADATA" | jq -r '."java${{ matrix.java_version }}-jre-distroless"["containerimage.digest"]')" >> $GITHUB_OUTPUT

      # ---------------- JDK ----------------
      - name: Attest JDK (Docker Hub)
        if: github.event.inputs.publish == 'true' && steps.digests.outputs.jdk != 'null'
        uses: actions/attest-build-provenance@v3  
        with:
          subject-name: index.docker.io/taha2samy/java
          subject-digest: ${{ steps.digests.outputs.jdk }}
          push-to-registry: true

      # ---------------- JRE ----------------
      - name: Attest JRE (Docker Hub)
        if: github.event.inputs.publish == 'true' && steps.digests.outputs.jre != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: index.docker.io/taha2samy/java
          subject-digest: ${{ steps.digests.outputs.jre }}
          push-to-registry: true

      # ---------------- Distroless ----------------
      - name: Attest Distroless (Docker Hub)
        if: github.event.inputs.publish == 'true' && steps.digests.outputs.distro != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: index.docker.io/taha2samy/java
          subject-digest: ${{ steps.digests.outputs.distro }}
          push-to-registry: true

      # ---------------- Verification ----------------

      - name: Attest JDK (GHCR)
        if: github.event.inputs.publish == 'true' && steps.digests.outputs.jdk != 'null'
        uses: actions/attest-build-provenance@v3   
        with:
          subject-name: ghcr.io/${{ env.OWNER_LC }}/open-jdk  # <--- تم التصليح هنا
          subject-digest: ${{ steps.digests.outputs.jdk }}
          push-to-registry: true

      # ---------------- JRE ----------------
      - name: Attest JRE (GHCR)
        if: github.event.inputs.publish == 'true' && steps.digests.outputs.jre != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ env.OWNER_LC }}/open-jdk  
          subject-digest: ${{ steps.digests.outputs.jre }}
          push-to-registry: true

      # ---------------- Distroless ----------------
      - name: Attest Distroless (GHCR)
        if: github.event.inputs.publish == 'true' && steps.digests.outputs.distro != 'null'
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ env.OWNER_LC }}/open-jdk  
          subject-digest: ${{ steps.digests.outputs.distro }}
          push-to-registry: true

      - name: Verify SLSA 3 Attestation
        if: github.event.inputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            set -euo pipefail

            verify_image () {
              local NAME="$1"
              local DIGEST="$2"

              if [ "$DIGEST" = "null" ] || [ -z "$DIGEST" ]; then
                echo "⚠️  Skipping $NAME (no digest)"
                return
              fi

              echo "🔍 Verifying SLSA Provenance for $NAME"
              echo "   GHCR: ghcr.io/${{ env.OWNER_LC }}/open-jdk@$DIGEST"
              echo "   Docker Hub: index.docker.io/taha2samy/java@$DIGEST"

              # Verify and capture JSON output
              OUTPUT=$(gh attestation verify \
                oci://ghcr.io/${{ env.OWNER_LC }}/open-jdk@$DIGEST \
                --owner ${{ env.OWNER_LC }} \
                --format json)

              echo "$OUTPUT" | jq .

              echo "✅ SLSA provenance VERIFIED for $NAME"
              echo "----------------------------------------"
            }

            verify_image "JDK"        "${{ steps.digests.outputs.jdk }}"
            verify_image "JRE"        "${{ steps.digests.outputs.jre }}"
            verify_image "Distroless" "${{ steps.digests.outputs.distro }}"
